<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cookie Clicker</title>
</head>
<body style="font-family: sans-serif; text-align: center; padding-top: 60px; background-color: #eef;">

  <h1>Cookie Clicker</h1>
  <button id="cookieButton" style="font-size: 4rem; border: none; cursor: pointer; background-color: transparent; ">🍪</button>
   <p>Cookies: <span id="counter">0</span></p>
   <p id="message">Click the cookie to begin</p>

   <body style="
  font-family: sans-serif;
  text-align: center;
  padding-top: 60px;
  background-color: #eef;
  transition: background-color 0.5s;
  ">

  <script>

const cookieButton = document.getElementById("cookieButton");
const counter = document.getElementById("counter");
const message = document.getElementById("message");

let clicks = 0;

cookieButton.addEventListener("click", () => {
  clicks++;
  counter.textContent = clicks;

  if (clicks === 10) {
  message.textContent = "You're just getting started!";
  document.body.style.backgroundColor = "#fff3b0";
} else if (clicks === 25) {
  message.textContent = "Wow, that's a lot of cookies!";
  document.body.style.backgroundColor = "#caffbf";
} else if (clicks === 50) {
  message.textContent = "Are you still clicking?";
  document.body.style.backgroundColor = "#bde0fe";
} else if (clicks === 100) {
  message.textContent = "You win! Maybe take a break.";
  document.body.style.backgroundColor = "#ffc8dd";
}

});
    
    

  </script>

</body>
</html>
